<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lattice Optimization | Mathélyo Favre-Réguillon</title>
  <style>
    :root{
      --bg:#f4f1ef;
      --text:#171717;
      --muted:#5f5f5f;
      --red:#d60000;
      --card:#ffffff;
      --shadow:0 20px 60px rgba(0,0,0,.08);
      --radius:28px;
      --max:1050px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}

    .container{
      width:min(var(--max), calc(100% - 2rem));
      margin:0 auto;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(16px);
      background:rgba(244,241,239,.82);
      border-bottom:1px solid rgba(0,0,0,.06);
    }

    .nav-inner{
      padding:1rem 0;
    }

    .back{
      color:var(--red);
      font-weight:800;
    }

    .hero{
      padding:4rem 0 3rem;
    }

    .tag{
      display:inline-block;
      padding:.4rem .75rem;
      border-radius:999px;
      background:#f7e5e5;
      color:#9b0000;
      font-size:.82rem;
      font-weight:800;
      margin-bottom:1rem;
    }

    h1{
      margin:0 0 1rem;
      font-size:clamp(2.5rem, 6vw, 4.8rem);
      line-height:1.02;
      letter-spacing:-.04em;
    }

    .lead{
      max-width:760px;
      font-size:1.08rem;
      color:#333;
      margin:0 0 2rem;
    }

    .image-wrap{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:1rem;
      overflow:hidden;
    }

    .image-wrap img{
      width:100%;
      height:560px;
      object-fit:contain;
      object-position:center;
      border-radius:22px;
      background:#fff;
    }

    @media (max-width: 900px){
      .hero{
        padding:3rem 0 2rem;
      }

      .image-wrap img{
        height:320px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="back" href="../index.html#projects" data-i18n="backToPortfolio">← Back to portfolio</a>
    </div>
  </nav>

  <main class="hero">
    <div class="container">
      <div class="tag" data-i18n="projectTag">Optimization / Simulation</div>
      <h1 data-i18n="projectTitle">Lattice optimization</h1>
      <p class="lead" data-i18n="projectLead">
        Development of a parametric lattice generation and simulation workflow to optimize lightweight structures through numerical modeling and performance analysis.
      </p>

      <div class="image-wrap">
        <img src="../photos/LatticeHero.png" alt="Lattice optimization project image">
      </div>
    </div>
  </main>

  <script>
    const translations = {
      en: {
        backToPortfolio: "← Back to portfolio",
        projectTag: "Optimization / Simulation",
        projectTitle: "Lattice optimization",
        projectLead: "Development of a parametric lattice generation and simulation workflow to optimize lightweight structures through numerical modeling and performance analysis."
      },
      fr: {
        backToPortfolio: "← Retour au portfolio",
        projectTag: "Optimisation / Simulation",
        projectTitle: "Optimisation de structure lattice",
        projectLead: "Développement d’un workflow paramétrique de génération et de simulation de structures lattice afin d’optimiser des structures allégées par modélisation numérique et analyse de performance."
      }
    };

    function applyTranslations(lang) {
      const dict = translations[lang] || translations.en;
      document.documentElement.lang = lang;

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.dataset.i18n;
        if (dict[key] !== undefined) {
          el.innerHTML = dict[key];
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      const savedLang =
        localStorage.getItem("siteLanguage") ||
        localStorage.getItem("language") ||
        localStorage.getItem("lang") ||
        sessionStorage.getItem("language") ||
        "en";

      applyTranslations(savedLang);
    });
  </script>
</body>
</html>
